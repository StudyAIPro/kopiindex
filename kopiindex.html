<!DOCTYPE html>
<html>
<head>
<title>Kopi Nusantara</title>

<style>

body{
font-family:Arial;
margin:0;

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1509042239860-f550ce710b93");

background-size:cover;
background-position:center;

color:white;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
padding:40px;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:15px;
margin-top:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#6b3e26;
color:white;
font-size:16px;
cursor:pointer;
margin-top:12px;
}

button:hover{
background:#4b2a1b;
}

select,input{
width:90%;
padding:10px;
margin:8px;
border-radius:6px;
border:1px solid #ccc;
}

.hidden{
display:none;
}

.receipt{
text-align:left;
font-family:monospace;
line-height:1.6;
}

.total{
font-weight:bold;
color:#27ae60;
}

@media print{

body *{
visibility:hidden;
}

#receipt, #receipt *{
visibility:visible;
}

#receipt{
position:absolute;
left:0;
top:0;
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<h1>☕ Kopi Nusantara</h1>
<p>Pesan kopi favoritmu</p>

<div class="card" id="menu">

<h3>Pilih Kopi</h3>

<select id="kopi">
<option value="15000">Espresso - 15000</option>
<option value="18000">Americano - 18000</option>
<option value="20000">Cappuccino - 20000</option>
<option value="22000">Latte - 22000</option>
<option value="25000">Mocha - 25000</option>
</select>

<br>

<input type="number" id="jumlah" placeholder="Jumlah" value="1">

<br>

<select id="metode">
<option>DANA</option>
<option>OVO</option>
<option>Cash</option>
</select>

<br>

<button onclick="bayar()">Bayar Sekarang</button>

</div>


<div class="card hidden" id="receipt">

<h3>STRUK PEMBAYARAN</h3>

<div class="receipt" id="isiStruk"></div>

<br>

<button onclick="printStruk()">Cetak Struk</button>
<br>
<button onclick="location.reload()">Pesan Lagi</button>

</div>

</div>

<script>

function bayar(){

var kopi=document.getElementById("kopi")
var namaKopi=kopi.options[kopi.selectedIndex].text
var harga=kopi.value

var jumlah=document.getElementById("jumlah").value
var metode=document.getElementById("metode").value

var total=harga*jumlah

var kode="INV"+Math.floor(Math.random()*100000)

var waktu=new Date().toLocaleString()

var struk=`

=====================
KOPI NUSANTARA
=====================

Menu : ${namaKopi}

Jumlah : ${jumlah}

Metode : ${metode}

---------------------

TOTAL : Rp ${total}

---------------------

Kode : ${kode}

Waktu : ${waktu}

Status : LUNAS

=====================

Terima Kasih ☕

`

document.getElementById("menu").style.display="none"

document.getElementById("receipt").classList.remove("hidden")

document.getElementById("isiStruk").innerText=struk

}

function printStruk(){

window.print()

}

</script>

</body>
</html>
